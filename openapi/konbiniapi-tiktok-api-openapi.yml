components:
  schemas:
    TikTokCollection:
      type: object
      properties:
        type:
          type: string
          description: ActivityStreams object type
          example: OrderedCollection
        id:
          type: string
          format: uri
          description: Collection permalink
          example: https://www.tiktok.com/@khaby.lame/playlist/7200000000000000001
        name:
          type: string
          description: Collection name
          example: Best of 2025
        image:
          allOf:
          - $ref: '#/components/schemas/TikTokImage'
          - description: Collection cover image
        totalItems:
          type:
          - integer
          - 'null'
          description: Number of items in collection
          example: 42
        entityId:
          type: string
          description: TikTok internal collection ID
          example: '7200000000000000001'
        attributedTo:
          allOf:
          - $ref: '#/components/schemas/TikTokEmbeddedUser'
          - description: Collection owner
      required:
      - type
      - id
      - name
      - totalItems
      - entityId
      - attributedTo
      description: Video collection or playlist
    TikTokStory:
      type: object
      properties:
        type:
          type: string
          description: ActivityStreams object type
          example: Video
        id:
          type: string
          format: uri
          description: Story permalink
          example: https://www.tiktok.com/@khaby.lame/video/7600000000000000000
        url:
          type: string
          format: uri
          description: Story URL
          example: https://www.tiktok.com/@khaby.lame/video/7600000000000000000
        entityId:
          type: string
          description: TikTok internal story ID
          example: '7600000000000000000'
        content:
          type: string
          description: Caption or description
          example: 'When you realize there is a simpler way #learnfromkhaby'
        published:
          type: string
          format: date-time
          description: Publication date in ISO 8601 format
          example: '2026-02-27T18:36:42.000Z'
        endTime:
          type: string
          format: date-time
          description: Story expiration date in ISO 8601 format
          example: '2026-02-28T18:36:42.000Z'
        viewCount:
          type: integer
          description: Number of views
          example: 42600000
        likeCount:
          type: integer
          description: Number of likes
          example: 2800000
        commentCount:
          type: integer
          description: Number of comments
          example: 29200
        repostCount:
          type: integer
          description: Number of reposts
          example: 0
        shareCount:
          type: integer
          description: Number of shares
          example: 157700
        saveCount:
          type: integer
          description: Number of saves
          example: 153238
        attributedTo:
          allOf:
          - $ref: '#/components/schemas/TikTokEmbeddedUser'
          - description: Story author
        duration:
          type: number
          description: Duration in seconds
          example: 23
        attachment:
          type: array
          items:
            $ref: '#/components/schemas/TikTokStoryAttachment'
          description: Video files
        image:
          allOf:
          - $ref: '#/components/schemas/TikTokImage'
          - description: Story thumbnail
        preview:
          allOf:
          - $ref: '#/components/schemas/TikTokImage'
          - description: Animated preview thumbnail
        audio:
          allOf:
          - $ref: '#/components/schemas/TikTokAudio'
          - description: Story audio track
      required:
      - type
      - id
      - url
      - entityId
      - published
      - viewCount
      - likeCount
      - commentCount
      - repostCount
      - shareCount
      - saveCount
      - attributedTo
      description: Story post
    TikTokEmbeddedUser:
      type: object
      properties:
        type:
          type: string
          description: ActivityStreams object type
          example: Person
        id:
          type: string
          format: uri
          description: Profile URL
          example: https://www.tiktok.com/@khaby.lame
        url:
          type: string
          format: uri
          description: Profile URL
