          type: string
          description: Instagram username (with or without @ symbol)
          example: khaby00
        required: true
        description: Instagram username (with or without @ symbol)
        name: username
        in: path
      - schema:
          type: integer
          minimum: 1
          maximum: 12
          default: 12
          description: 'Number of posts to fetch (maximum: 12)'
          example: 12
        required: false
        description: 'Number of posts to fetch (maximum: 12)'
        name: count
        in: query
      - schema:
          type: string
          description: Pagination cursor
          example: '0'
        required: false
        description: Pagination cursor
        name: cursor
        in: query
      responses:
