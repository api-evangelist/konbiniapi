components:
  schemas:
    InstagramImageWithDimensions:
      allOf:
      - $ref: '#/components/schemas/InstagramImage'
      - type: object
        properties:
          width:
            type: integer
            description: Width in pixels
            example: 1080
          height:
            type: integer
            description: Height in pixels
            example: 1920
      description: Image resource with optional dimensions
    InstagramImage:
      type: object
      properties:
        type:
          type: string
          description: ActivityStreams object type
          example: Image
        url:
          type: string
          format: uri
          description: Image URL
          example: https://scontent.cdninstagram.com/v/t51.2885-19/avatar.jpg
      required:
      - type
      - url
      description: Image resource
    InstagramCarouselItem:
      type: object
      properties:
        type:
          type: string
          description: ActivityStreams object type
          example: Image
        entityId:
          type: string
          description: Instagram internal media ID
          example: '3214260996432123574'
        image:
          allOf:
          - $ref: '#/components/schemas/InstagramImageWithDimensions'
          - description: Item thumbnail
        attachment:
          type: array
          items:
            $ref: '#/components/schemas/InstagramAttachment'
          description: Media files
        name:
          type: string
          description: Alt text
          example: Photo of Khabane Lame
      required:
      - type
      - entityId
      description: Individual slide in a carousel post
    InstagramAudio:
      type: object
      properties:
        type:
          type: string
          description: ActivityStreams object type
          example: Audio
        id:
          type: string
          format: uri
          description: Audio permalink
          example: https://www.instagram.com/reels/audio/293394603591002/
        entityId:
          type: string
          description: Platform-specific audio ID
          example: '293394603591002'
        name:
          type: string
          description: Track name
          example: Original audio
        artist:
          type: string
          description: Artist name
          example: khaby00
        isOriginal:
          type: boolean
          description: Whether audio is user-created vs a licensed track
          example: true
        duration:
          type: number
          description: Duration in seconds
          example: 85.216
      required:
      - type
      - entityId
      - name
      - artist
      - isOriginal
      description: Audio track metadata
    InstagramLink:
      type: object
      properties:
        type:
          type: string
          description: ActivityStreams object type
          example: Link
        href:
          type: string
          format: uri
          description: Link URL
          example: https://linktr.ee/khabylame
        rel:
          type: string
          description: Link relation hint
          example: preferred
      required:
      - type
      - href
      description: External link
    InstagramAttachment:
      type: object
      properties:
        type:
          type: string
          description: ActivityStreams object type
          example: Video
        url:
          type: array
          items:
            type: string
            format: uri
          description: Media download URLs
          example:
          - https://scontent.cdninstagram.com/v/t50.2886-16/video.mp4
        mediaType:
          type: string
          description: MIME type
          example: video/mp4
        width:
          type: integer
          description: Width in pixels
          example: 576
        height:
          type: integer
          description: Height in pixels
          example: 1024
      required:
      - type
      - url
      description: Media file attachment
    InstagramPost:
      type: object
      properties:
        type:
          type: string
          description: ActivityStreams object type
          example: Video
        id:
          type: string
          format: uri
          description: Post permalink
          example: https://www.instagram.com/p/CybWViruta1/
        url:
          type: string
          format: uri
          description: Post URL
          example: https://www.instagram.com/p/CybWViruta1/
        entityId:
          type: string
          description: Post shortcode (used as lookup key)
          example: CybWViruta1
        content:
          type: string
          description: Caption or description
          example: 'When you realize there is a simpler way #learnfromkhaby'
        published:
          type: string
          format: date-time
          description: Publication date in ISO 8601 format
          example: '2026-02-27T18:36:42.000Z'
        likeCount:
          type: integer
          description: Number of likes
          example: 2800000
        commentCount:
          type: integer
