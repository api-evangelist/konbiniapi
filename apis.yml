name: KonbiniAPI
type: Index
image: https://konbiniapi.com/konbini-logo.svg
description: >-
  KonbiniAPI is the social data layer for Instagram and TikTok, normalizing real-time public profile, post, video,
  comment, audio, location, and search data into a consistent ActivityStreams 2.0 (W3C) format. The service exposes one
  Bearer-authenticated REST API and an MCP (Model Context Protocol) interface so developers, AI agents, and automation
  platforms can fetch normalized social data without managing platform-specific JSON quirks, TLS fingerprinting,
  sessions, or pagination internals.
created: '2026-05-06'
