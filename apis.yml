apis:
  - aid: konbiniapi:main
    name: KonbiniAPI Main Spec
    description: >-
      Unified Instagram and TikTok REST API (30 endpoints) returning normalized ActivityStreams 2.0 JSON. Covers user
      profiles, posts, reels, videos, stories, highlights, comments, replies, transcripts, audios, hashtags/tags,
      collections, locations, live streams, and cross-platform search. Every authenticated response includes
      X-Credits-Remaining and X-Credits-Used headers, and failed requests are auto-refunded.
    image: https://konbiniapi.com/konbini-logo.svg
