apiVersion: naftiko.dev/v1
kind: Capability
metadata:
  name: konbiniapi
  description: >-
    Shared KonbiniAPI capability — exposes the 30 read-only endpoints that
    return Instagram and TikTok data normalized to ActivityStreams 2.0.
spec:
  api:
    id: konbiniapi
    title: KonbiniAPI
    baseUrl: https://api.konbiniapi.com/v1
    openapi: ../../openapi/konbiniapi-openapi.yml
  authentication:
    type: bearer
    header: Authorization
    valuePrefix: 'Bearer '
    tokenSource:
      env: KONBINIAPI_TOKEN
      keyPattern: '^knbn_[A-Za-z0-9_-]+$'
  metering:
    creditsPerRequest: 1
    responseHeaders:
      remaining: X-Credits-Remaining
      used: X-Credits-Used
    refundedStatusCodes: [400, 500, 502, 503, 504]
  retry:
    strategy: exponential-backoff
    maxAttempts: 3
    retryableStatus: [429, 500, 502, 503, 504]
  operations:
    instagram:
      - instagramGetUser
      - instagramGetUserPosts
      - instagramGetUserReels
      - instagramGetUserTagged
      - instagramGetUserHighlights
      - instagramGetPost
      - instagramGetPostComments
      - instagramSearch
      - instagramGetLocationPosts
      - instagramGetHighlightStories
    tiktok:
      - tiktokGetUser
      - tiktokGetUserVideos
      - tiktokGetUserLikes
      - tiktokGetUserReposts
      - tiktokGetUserCollections
      - tiktokGetUserStories
      - tiktokGetUserFollowing
      - tiktokGetUserFollowers
      - tiktokGetUserLive
      - tiktokGetVideo
      - tiktokGetVideoComments
      - tiktokGetCommentReplies
      - tiktokGetVideoTranscript
      - tiktokGetTagVideos
      - tiktokGetCollectionVideos
      - tiktokGetAudio
      - tiktokGetAudioVideos
      - tiktokSearch
      - tiktokSearchUsers
      - tiktokSearchVideos
